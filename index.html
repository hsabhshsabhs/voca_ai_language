<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <title>lingvo.ai — Твой AI репетитор</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0a0a0f',
                        surface: '#111118',
                        surfaceHover: '#1a1a24',
                        border: '#1f1f2e',
                        borderLight: '#2a2a3e',
                        foreground: '#f4f4f5',
                        muted: '#71717a',
                        accent: '#6366f1',
                        accentLight: '#818cf8',
                        accentDark: '#4f46e5',
                        success: '#22c55e',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Space Grotesk', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        html, body, #root { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #0a0a0f; color: #f4f4f5; }
        body { font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 4px; }
        
        .app-layout { display: flex; flex-direction: column; height: 100dvh; max-width: 600px; margin: 0 auto; background: #0a0a0f; position: relative; border-left: 1px solid #1f1f2e; border-right: 1px solid #1f1f2e; }
        .app-header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 1rem; background: linear-gradient(180deg, #111118 0%, #0a0a0f 100%); border-bottom: 1px solid #1f1f2e; z-index: 20; }
        .chat-zone { flex: 1; overflow-y: auto; padding: 1rem 50px; background: radial-gradient(ellipse at top, #111118 0%, #0a0a0f 50%); scroll-behavior: smooth; }
        .bottom-panel { display: flex; flex-direction: column; border-top: 1px solid #1f1f2e; background: #111118; padding-bottom: env(safe-area-inset-bottom); }
        .suggestions-area { max-height: 140px; overflow-y: auto; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .input-bar { min-height: 64px; padding: 0.75rem 1rem; display: flex; gap: 0.75rem; align-items: center; background: #0a0a0f; border-top: 1px solid #1f1f2e; }
        
        .bubble { max-width: 85%; border-radius: 1.25rem; padding: 0.875rem 1rem; margin-bottom: 0.75rem; position: relative; font-size: 0.9375rem; line-height: 1.5; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bubble.user { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; margin-left: auto; border-bottom-right-radius: 0.375rem; box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3); }
        .bubble.ai { background: #1a1a24; color: #f4f4f5; border-bottom-left-radius: 0.375rem; border: 1px solid #2a2a3e; }
        
        .suggestion-card { background: #1a1a24; border: 1px solid #2a2a3e; border-radius: 1rem; padding: 0.75rem 1rem; text-align: left; width: 100%; transition: all 0.2s; cursor: pointer; }
        .suggestion-card:hover { background: #222230; border-color: #6366f1; }
        .suggestion-card .en { font-size: 0.9375rem; font-weight: 600; color: #f4f4f5; margin-bottom: 0.1rem; }
        .suggestion-card .ru { font-size: 0.8125rem; color: #71717a; }
        
        .modal-overlay { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px); z-index: 1000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .modal-content { background: #111118; width: 100%; max-width: 420px; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #2a2a3e; }
        
        .explain-btn { width: 30px; height: 30px; background: rgba(251, 191, 36, 0.1); color: #fbbf24; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; position: absolute; right: -40px; top: 5px; border: 1px solid rgba(251, 191, 36, 0.3); transition: all 0.2s; z-index: 10; cursor: pointer; }
        .explain-btn.disabled { opacity: 0.2; cursor: default; border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }
        .bubble.user .explain-btn { background: rgba(99, 102, 241, 0.1); color: #818cf8; border-color: rgba(99, 102, 241, 0.3); left: -40px; right: auto; }
        .bubble.user .explain-btn.disabled { opacity: 0.2; }
        .explain-btn:not(.disabled):hover { transform: scale(1.1); box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); }
        .explain-btn.loading { animation: rotate 1s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .suggestions-toggle { width: 100%; padding: 0.5rem; background: #1a1a24; border-top: 1px solid #1f1f2e; color: #818cf8; font-size: 0.75rem; font-weight: 600; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: background 0.2s; }
        .suggestions-toggle:hover { background: #222230; }
        .show-trans-btn { color: #818cf8; font-size: 0.8125rem; font-weight: 500; margin-top: 0.5rem; display: inline-flex; align-items: center; gap: 0.375rem; cursor: pointer; }
        .translation-text { color: #71717a; font-size: 0.875rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #2a2a3e; }
        
        .dot-pulse { display: flex; gap: 4px; padding: 4px 0; }
        .dot-pulse span { width: 8px; height: 8px; background: #6366f1; border-radius: 50%; animation: dotPulse 1.4s ease-in-out infinite; }
        .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
        .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
        
        .input-field { width: 100%; padding: 0.875rem 1rem; background: #1a1a24; border: 1px solid #2a2a3e; border-radius: 0.875rem; color: #f4f4f5; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: #6366f1; }
        .btn-primary { width: 100%; padding: 1rem; background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; border-radius: 0.875rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .credits-badge { display: flex; align-items: center; gap: 0.375rem; padding: 0.5rem 0.75rem; background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 2rem; font-size: 0.875rem; font-weight: 600; color: #a5b4fc; cursor: pointer; transition: all 0.2s; }
        .credits-badge:hover { background: rgba(99, 102, 241, 0.2); border-color: rgba(99, 102, 241, 0.4); transform: translateY(-1px); }

        .feature-card { background: #111118; border: 1px solid #1f1f2e; border-radius: 1rem; padding: 1rem; transition: all 0.2s; text-align: left; width: 100%; }
        .feature-card.active { border-color: #6366f1; background: rgba(99, 102, 241, 0.05); }
        
        .analysis-modal { background: #0a0a0f; width: 100%; max-width: 600px; max-height: 85vh; border-radius: 2rem; border: 1px solid #1f1f2e; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative; }
        .analysis-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid #1f1f2e; background: #111118; }
        .analysis-modal-content { flex: 1; overflow-y: auto; padding: 1.5rem; line-height: 1.7; }
        .gradient-text { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE = "";

        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.enableClosingConfirmation();
        }

        const Icons = {
            Send: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
            Eye: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
            Back: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
            Gem: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 3h12l4 6-10 13L2 9Z"/><path d="m12 22 4-13-3-6"/><path d="m12 22-4-13 3-6"/><path d="M2 9h20"/></svg>,
            Close: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Sparkles: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>,
            X: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
        };

        function SetupScreen({ onStart, character, setCharacter, situation, setSituation, credits, onShopOpen }) {
            const presets = [
                { char: "Бариста", sit: "Заказ кофе", label: "Бариста" },
                { char: "Доктор", sit: "Прием у врача", label: "Врач" },
                { char: "Гид", sit: "Экскурсия", label: "Гид" },
                { char: "Продавец", sit: "Покупка одежды", label: "Продавец" },
            ];

            return (
                <div className="app-layout p-6" style={{ background: 'radial-gradient(ellipse at center top, #111118 0%, #0a0a0f 60%)' }}>
                    <div className="flex justify-between items-center mb-8">
                        <h1 className="text-2xl font-display font-bold gradient-text">lingvo.ai</h1>
                        <div onClick={onShopOpen} className="credits-badge"><Icons.Gem /><span>{credits}</span></div>
                    </div>
                    <div className="space-y-6">
                        <div className="bg-surface/50 p-4 rounded-xl border border-border">
                            <h2 className="font-semibold mb-2 flex items-center gap-2 text-accent"><Icons.Sparkles /> Быстрый старт</h2>
                            <div className="grid grid-cols-2 gap-3 mt-4">
                                {presets.map((p, i) => (
                                    <button key={i} onClick={()=>{setCharacter(p.char); setSituation(p.sit);}} className={`feature-card ${character===p.char ? 'active' : ''}`}>
                                        <div className="font-semibold text-sm">{p.label}</div>
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="space-y-4">
                            <div><label className="text-xs uppercase text-muted mb-2 block font-bold">Роль собеседника</label><input className="input-field w-full" placeholder="Илон Маск" value={character} onChange={e=>setCharacter(e.target.value)} /></div>
                            <div><label className="text-xs uppercase text-muted mb-2 block font-bold">Ситуация</label><input className="input-field w-full" placeholder="Интервью" value={situation} onChange={e=>setSituation(e.target.value)} /></div>
                            <button onClick={onStart} disabled={!character||!situation} className="btn-primary w-full py-4 text-lg">Начать</button>
                        </div>
                    </div>
                </div>
            );
        }

        function ShopModal({ onClose, token, onPurchaseSuccess }) {
            const [loading, setLoading] = useState(false);
            const packages = [{ stars: 50, credits: 100 }, { stars: 100, credits: 250 }, { stars: 500, credits: 1500 }];

            const buy = async (amount) => {
                setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/create-invoice`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ amount })
                    });
                    const data = await res.json();
                    if (data.invoice_link) tg.openInvoice(data.invoice_link, (status) => { if (status === 'paid') onPurchaseSuccess(); onClose(); });
                } catch (e) { alert("Error"); }
                finally { setLoading(false); }
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e=>e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-6"><h2 className="text-xl font-bold">Магазин Stars</h2><button onClick={onClose}><Icons.X /></button></div>
                        <div className="space-y-3">
                            {packages.map((p, i) => (
                                <button key={i} onClick={() => buy(p.stars)} disabled={loading} className="w-full p-4 bg-surface border border-border rounded-xl flex items-center justify-between">
                                    <div className="font-bold text-lg">{p.credits} кредитов</div>
                                    <div className="bg-accent/10 text-accent px-3 py-1 rounded-lg font-bold">{p.stars} ⭐</div>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function ChatScreen({ messages, loading, suggestions, showSuggestions, setShowSuggestions, input, setInput, onSend, onBack, credits, onShopOpen, onAnalyze, analysisLoading, setAnalysisModal }) {
            const scrollRef = useRef();
            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);
            const [visTrans, setVisTrans] = useState({});

            return (
                <div className="app-layout">
                    <header className="app-header">
                        <button onClick={onBack} className="p-2 rounded-lg"><Icons.Back /></button>
                        <h2 className="font-bold text-lg gradient-text">lingvo.ai</h2>
                        <div onClick={onShopOpen} className="credits-badge"><Icons.Gem /><span>{credits}</span></div>
                    </header>
                    <main className="chat-zone">
                        {messages.map((m, i) => (
                            <div key={m.id || i} className={`bubble ${m.role==='user'?'user':'ai'}`}>
                                {m.content && m.role === 'assistant' && (
                                    <div onClick={() => onAnalyze(m.id, m.content)} className={`explain-btn ${analysisLoading === m.id ? 'loading' : ''}`}>?</div>
                                )}
                                <div className="whitespace-pre-wrap">{m.content || "..."}</div>
                                {m.role === 'assistant' && m.translation && (
                                    <div className="mt-2 pt-2 border-t border-border">
                                        {!visTrans[m.id] ? <div className="text-accent text-sm" onClick={()=>setVisTrans({...visTrans,[m.id]:true})}>Перевод</div> : <div className="text-muted text-sm">{m.translation}</div>}
                                    </div>
                                )}
                            </div>
                        ))}
                        <div ref={scrollRef} />
                    </main>
                    <footer className="bottom-panel p-2">
                        <div className="flex gap-2">
                            <input className="input-field flex-1" placeholder="English..." value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key==='Enter'&&onSend(input)} />
                            <button onClick={()=>onSend(input)} className="w-12 h-12 flex items-center justify-center bg-accent rounded-xl"><Icons.Send /></button>
                        </div>
                    </footer>
                </div>
            );
        }

        function App() {
            const [token, setToken] = useState(localStorage.getItem('lingvo_token'));
            const [credits, setCredits] = useState(0);
            const [step, setStep] = useState('setup');
            const [character, setCharacter] = useState('');
            const [situation, setSituation] = useState('');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [suggestions, setSuggestions] = useState([]);
            const [showSuggestions, setShowSuggestions] = useState(false);
            const [loading, setLoading] = useState(false);
            const [analysisLoading, setAnalysisLoading] = useState(null);
            const [analysisModal, setAnalysisModal] = useState({ isOpen: false, content: '' });
            const [isShopOpen, setIsShopOpen] = useState(false);

            const authenticate = async () => {
                if (!tg?.initData) return;
                const r = await fetch(`${API_BASE}/auth/telegram`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData })
                });
                const data = await r.json();
                if (data.access_token) {
                    localStorage.setItem('lingvo_token', data.access_token);
                    setToken(data.access_token);
                    setCredits(data.credits);
                }
            };

            const fetchCredits = async () => {
                if (!token) return;
                const r = await fetch(`${API_BASE}/me`, { headers: { "Authorization": `Bearer ${token}` } });
                if (r.status === 401) {
                    localStorage.removeItem('lingvo_token');
                    setToken(null);
                    authenticate();
                    return;
                }
                const d = await r.json(); 
                if (d.credits !== undefined) setCredits(d.credits);
            };

            useEffect(() => { if (!token) authenticate(); else fetchCredits(); }, [token]);

            const triggerAI = async (hist) => {
                setLoading(true);
                const aiMsgId = Date.now() + 1;
                setMessages(prev => [...prev, { role: 'assistant', content: '', id: aiMsgId }]);
                try {
                    const res = await fetch(`${API_BASE}/chat_stream?token=${token}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ character, situation, history: hist })
                    });
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let full = "";
                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        if (chunk.includes("||META||")) {
                            const pts = chunk.split("||META||");
                            full += pts[0];
                            const meta = JSON.parse(pts[1]);
                            setMessages(prev => prev.map(m => m.id === aiMsgId ? { ...m, content: full, translation: meta.translation } : m));
                            setSuggestions(meta.suggestions || []);
                            break;
                        } else {
                            full += chunk;
                            setMessages(prev => prev.map(m => m.id === aiMsgId ? { ...m, content: full } : m));
                        }
                    }
                } catch(e) {} finally { setLoading(false); fetchCredits(); }
            };

            const onSend = (txt) => {
                if (!txt.trim() || loading) return;
                const next = [...messages, { role: 'user', content: txt, id: Date.now() }];
                setMessages(next); setInput('');
                triggerAI(next.map(m=>({role:m.role, content:m.content})));
            };

            const onAnalyze = async (id, txt) => {
                setAnalysisLoading(id);
                try {
                    const res = await fetch(`${API_BASE}/explain`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ text: txt })
                    });
                    const data = await res.json();
                    setAnalysisModal({ isOpen: true, content: data.explanation });
                } catch(e) {} finally { setAnalysisLoading(null); fetchCredits(); }
            };

            if (!token && tg?.initData) return <div className="h-screen flex items-center justify-center bg-background text-white">Авторизация...</div>;
            if (!token) return <div className="h-screen flex items-center justify-center bg-background text-white p-10 text-center">Open in Telegram</div>;

            return (
                <>
                    {step === 'setup' ? (
                        <SetupScreen onStart={()=> {setStep('chat'); triggerAI([]);}} character={character} setCharacter={setCharacter} situation={situation} setSituation={setSituation} credits={credits} onShopOpen={()=>setIsShopOpen(true)} />
                    ) : (
                        <ChatScreen messages={messages} loading={loading} input={input} setInput={setInput} onSend={onSend} onBack={()=>setStep('setup')} credits={credits} onShopOpen={()=>setIsShopOpen(true)} onAnalyze={onAnalyze} analysisLoading={analysisLoading} setAnalysisModal={setAnalysisModal} />
                    )}
                    {isShopOpen && <ShopModal onClose={()=>setIsShopOpen(false)} token={token} onPurchaseSuccess={fetchCredits} />}
                    {analysisModal.isOpen && (
                        <div className="modal-overlay" onClick={()=>setAnalysisModal({isOpen:false, content:''})}>
                            <div className="modal-content overflow-y-auto max-h-[80vh]" onClick={e=>e.stopPropagation()}>
                                <div dangerouslySetInnerHTML={{__html: marked.parse(analysisModal.content)}} />
                                <button className="btn-primary mt-4" onClick={()=>setAnalysisModal({isOpen:false, content:''})}>Закрыть</button>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
