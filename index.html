<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>lingvo.ai — Твой личный репетитор</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        html, body, #root { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #f1f5f9; }
        body { font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
        .app-layout { display: flex; flex-direction: column; height: 100dvh; max-width: 800px; margin: 0 auto; background: #ffffff; position: relative; }
        header { height: 56px; flex-shrink: 0; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 1rem; background: white; z-index: 20; }
        .chat-zone { flex: 1; height: 70dvh; overflow-y: auto; background-color: #e7ebf0; padding: 1rem; scrollbar-width: none; }
        .chat-zone::-webkit-scrollbar { display: none; }
        .bottom-panel { height: 30dvh; display: flex; flex-direction: column; border-top: 1px solid #d1d9e0; background: white; flex-shrink: 0; }
        .suggestions-area { flex: 1; overflow-y: auto; padding: 0.75rem; background: #ffffff; }
        .input-bar { height: 64px; flex-shrink: 0; padding: 0 0.75rem; display: flex; gap: 0.5rem; border-top: 1px solid #f1f5f9; align-items: center; background: white; }
        .bubble { max-width: 85%; border-radius: 1rem; padding: 0.6rem 0.9rem; margin-bottom: 0.75rem; position: relative; font-size: 1.05rem; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user { background: #effdde; color: #000; margin-left: auto; border-bottom-right-radius: 0.2rem; }
        .ai { background: white; color: #000; border-bottom-left-radius: 0.2rem; }
        .show-trans-btn { color: #2481cc; font-size: 0.85rem; font-weight: 600; margin-top: 0.4rem; display: block; cursor: pointer; border-top: 1px solid #f1f1f1; padding-top: 0.3rem; }
        .translation-text { color: #64748b; font-style: italic; font-size: 0.9rem; margin-top: 0.4rem; border-top: 1px solid #f1f5f9; padding-top: 0.3rem; }
        .suggestion-card { background: #ffffff; border: 1px solid #d1d9e0; border-radius: 0.75rem; padding: 0.6rem 1rem; text-align: left; width: 100%; margin-bottom: 0.5rem; }
        .suggestion-card .en { font-size: 1.1rem; font-weight: 800; color: #2481cc; line-height: 1.2; }
        .suggestion-card .ru { font-size: 0.85rem; color: #64748b; }
        .mini-q-icon { display: inline-flex; width: 20px; height: 20px; background: #fffbeb; color: #d97706; border: 1px solid #fef3c7; border-radius: 50%; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; margin: 0 4px; vertical-align: middle; }
        .dot-pulse { display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE = ""; 

        function AuthScreen({ onLogin }) {
            const [mode, setMode] = useState("login");
            const [username, setUsername] = useState("");
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");

            const handleSubmit = async () => {
                setError("");
                try {
                    let url = mode === "register" ? "/register" : "/token";
                    let body = mode === "register" ? JSON.stringify({ username, email, password }) : new URLSearchParams({ username, password });
                    const res = await fetch(`${API_BASE}${url}`, {
                        method: "POST",
                        headers: mode === "register" ? { "Content-Type": "application/json" } : { "Content-Type": "application/x-www-form-urlencoded" },
                        body: body
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Ошибка");
                    if (mode === "register") { setMode("login"); alert("Регистрация успешна!"); return; }
                    localStorage.setItem('lingvo_token', data.access_token);
                    onLogin(data.access_token, data.credits);
                } catch (e) { setError(e.message); }
            };

            return (
                <div className="h-full flex items-center justify-center p-4 bg-slate-50">
                    <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border border-slate-100">
                        <h1 className="text-4xl font-black mb-6 text-blue-600 text-center italic tracking-tighter">lingvo.ai</h1>
                        <h2 className="text-xl font-bold mb-4 text-center">{mode === "login" ? "Вход" : "Регистрация"}</h2>
                        <input className="w-full p-4 mb-3 bg-slate-50 border rounded-xl" placeholder="Логин" value={username} onChange={e=>setUsername(e.target.value)} />
                        {mode === "register" && <input className="w-full p-4 mb-3 bg-slate-50 border rounded-xl" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} />}
                        <input className="w-full p-4 mb-4 bg-slate-50 border rounded-xl" type="password" placeholder="Пароль" value={password} onChange={e=>setPassword(e.target.value)} />
                        {error && <div className="text-red-500 text-sm mb-4 text-center">{error}</div>}
                        <button onClick={handleSubmit} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg mb-4 shadow-lg">{mode === "login" ? "Войти" : "Создать аккаунт"}</button>
                        <div className="text-center text-sm text-slate-500 cursor-pointer" onClick={() => setMode(mode === "login" ? "register" : "login")}>{mode === "login" ? "Нет аккаунта? Регистрация (+50 💎)" : "Уже есть аккаунт? Войти"}</div>
                    </div>
                </div>
            );
        }

        function App() {
            const [token, setToken] = useState(localStorage.getItem('lingvo_token'));
            const [credits, setCredits] = useState(0);
            const [step, setStep] = useState('setup');
            const [character, setCharacter] = useState('');
            const [situation, setSituation] = useState('');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [suggestions, setSuggestions] = useState([]);
            const [loading, setLoading] = useState(false);
            const [visibleTranslations, setVisibleTranslations] = useState({});
            const scrollRef = useRef(null);

            useEffect(() => { if (token) { fetch(`${API_BASE}/me`, { headers: { "Authorization": `Bearer ${token}` } }).then(r => r.json()).then(d => setCredits(d.credits)).catch(() => setToken(null)); } }, [token]);
            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading, suggestions]);

            if (!token) return <AuthScreen onLogin={(t, c) => { setToken(t); setCredits(c); }} />;

            const handleTriggerAI = async (history) => {
                setLoading(true); setSuggestions([]);
                setMessages(prev => [...prev, { role: 'assistant', content: '', translation: '', id: Date.now() }]);
                try {
                    const response = await fetch(`${API_BASE}/chat_stream?token=${token}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ character, situation, history: history.map(m=>({role:m.role,content:m.content})), mode: "with_suggestions" })
                    });
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let streamBuffer = "";
                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        streamBuffer += decoder.decode(value, { stream: true });
                        if (streamBuffer.includes("||META||")) {
                            const [textPart, metaPart] = streamBuffer.split("||META||");
                            try {
                                const parsed = JSON.parse(metaPart);
                                setMessages(prev => {
                                    const next = [...prev];
                                    const lastIdx = next.length - 1;
                                    next[lastIdx] = { ...next[lastIdx], content: textPart, translation: parsed.translation };
                                    return next;
                                });
                                setSuggestions(parsed.suggestions || []);
                                setCredits(c => c - 1);
                            } catch(e) {}
                            break;
                        } else {
                            const currentText = streamBuffer;
                            setMessages(prev => {
                                const next = [...prev];
                                next[next.length - 1].content = currentText;
                                return next;
                            });
                        }
                    }
                } catch (err) { alert("Ошибка!"); } finally { setLoading(false); }
            };

            const sendMessage = (text) => {
                if (!text.trim() || loading) return;
                const newHistory = [...messages.filter(m=>m.content).map(m=>({role:m.role,content:m.content})), { role: 'user', content: text }];
                setMessages(newHistory); setInput(''); handleTriggerAI(newHistory);
            };

            if (step === 'setup') return (
                <div className="h-full flex items-center justify-center p-4 bg-slate-50 overflow-y-auto">
                    <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-xl border border-slate-100 my-auto">
                        <div className="text-right font-bold text-blue-600 mb-4">Баланс: {credits} 💎</div>
                        <h1 className="text-5xl font-black mb-6 text-blue-600 text-center italic tracking-tighter uppercase">lingvo.ai</h1>
                        <div className="bg-blue-50 p-6 rounded-3xl mb-8 border border-blue-100 text-sm text-blue-700 font-medium">
                            <h3 className="font-bold text-blue-800 mb-3 italic text-lg text-center md:text-left">🚀 Как это работает?</h3>
                            <ul className="space-y-3">
                                <li>• Выбери любую роль и ситуацию для общения.</li>
                                <li>• Разбор <span className="mini-q-icon">?</span> объяснит правила построения фразы.</li>
                                <li>• lingvo.ai исправит твои ошибки и даст совет.</li>
                                <li>• Перевод скрыт — нажми, чтобы проверить себя.</li>
                            </ul>
                        </div>
                        <div className="space-y-6">
                            <div><label className="block text-xs font-black text-slate-400 uppercase mb-2 ml-2 tracking-widest">Собеседник</label><input className="w-full p-5 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-lg" placeholder="Напр: Бариста" value={character} onChange={e => setCharacter(e.target.value)} /></div>
                            <div><label className="block text-xs font-black text-slate-400 uppercase mb-2 ml-2 tracking-widest">Ситуация</label><textarea className="w-full p-5 bg-slate-50 border rounded-2xl h-32 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-lg" placeholder="Напр: Заказ латте" value={situation} onChange={e => setSituation(e.target.value)} /></div>
                            <button onClick={() => { if(character && situation) { setStep('chat'); handleTriggerAI([]); } }} className="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-xl uppercase transition-all">Начать диалог</button>
                        </div>
                        <div className="text-center mt-6 text-slate-400 text-sm cursor-pointer" onClick={() => { localStorage.removeItem('lingvo_token'); setToken(null); }}>Выйти из аккаунта</div>
                    </div>
                </div>
            );

            return (
                <div className="app-layout">
                    <header>
                        <h2 className="font-black text-blue-600 text-xl tracking-tighter uppercase">lingvo.ai</h2>
                        <div className="flex items-center gap-3">
                            <div className="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-lg">{credits} 💎</div>
                            <button onClick={() => window.location.reload()} className="text-slate-300">🔄</button>
                        </div>
                    </header>
                    <main className="chat-zone">
                        {messages.map((m, i) => (
                            <div key={i} className={`bubble ${m.role === 'user' ? 'user' : 'ai'}`}>
                                <div className="font-medium whitespace-pre-wrap">{m.content || <span className="dot-pulse">● ● ●</span>}</div>
                                {m.role === 'assistant' && m.translation && (
                                    <div>{!visibleTranslations[m.id] ? (<div onClick={() => setVisibleTranslations(v=>({...v, [m.id]:true}))} className="show-trans-btn">Показать перевод</div>) : (<div className="translation-text">{m.translation}</div>)}</div>
                                )}
                                {m.role === 'user' && m.correction && (<div className="mt-3 bg-black/5 p-3 rounded-xl text-xs border border-black/10 text-black font-medium"><div>⭐ Исправлено: {m.correction.corrected}</div><div className="opacity-70 mt-1">{m.correction.explanation}</div></div>) }
                            </div>
                        ))}
                        <div ref={scrollRef} />
                    </main>
                    <footer className="bottom-panel">
                        <div className="suggestions-area">
                            {!loading && suggestions.map((s, i) => (<button key={i} onClick={() => sendMessage(s.en)} className="suggestion-card active:scale-[0.98]"><div className="en">{s.en}</div><div className="ru">{s.ru}</div></button>))}
                        </div>
                        <div className="input-bar">
                            <input className="flex-1 p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-800" placeholder="Ответь..." value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && sendMessage(input)} />
                            <button onClick={() => sendMessage(input)} className="bg-blue-600 text-white w-12 h-12 rounded-2xl font-black shadow-lg flex items-center justify-center flex-shrink-0">⮕</button>
                        </div>
                    </footer>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
