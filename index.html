<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voca AI — Твой личный репетитор</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; overflow-x: hidden; width: 100%; }
        .chat-scroll { height: calc(100vh - 280px); overflow-y: auto; scrollbar-width: none; }
        @media (max-width: 768px) { .chat-scroll { height: calc(100vh - 340px); } }
        .bubble { max-width: 85%; border-radius: 1.25rem; padding: 1rem 1.25rem; margin-bottom: 1rem; position: relative; }
        .user { background: #2563eb; color: white; margin-left: auto; border-bottom-right-radius: 0.2rem; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .ai { background: white; color: #1e293b; border-bottom-left-radius: 0.2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .translation { color: #64748b; font-style: italic; font-size: 0.85rem; border-top: 1px solid #f1f5f9; margin-top: 0.75rem; padding-top: 0.5rem; }
        
        /* Explain buttons */
        .explain-btn { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; cursor: pointer; transition: all 0.2s; position: absolute; top: 8px; z-index: 10; }
        .ai .explain-btn { background: #fffbeb; color: #d97706; border: 2px solid #fef3c7; right: -45px; }
        .user .explain-btn { background: #eff6ff; color: #1e40af; border: 2px solid #dbeafe; left: -45px; }
        
        @media (max-width: 640px) {
            .ai .explain-btn { right: -5px; top: -15px; }
            .user .explain-btn { left: -5px; top: -15px; }
            .chat-scroll { padding-right: 1rem; padding-left: 1rem; }
        }

        .suggestion-card { min-height: 90px; display: flex; flex-direction: column; justify-content: center; background: white; border: 2px solid #e2e8f0; border-radius: 1.25rem; padding: 0.75rem 1.25rem; transition: all 0.2s; text-align: left; width: 100%; }
        .suggestion-card .en-text { font-size: 1.15rem; font-weight: 800; color: #1e40af; line-height: 1.2; }
        .suggestion-card .ru-text { font-size: 0.9rem; color: #64748b; margin-top: 4px; }
        
        .modal-overlay { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(10px); z-index: 999; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .dot-pulse { display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [step, setStep] = useState('setup');
            const [apiKey, setApiKey] = useState(localStorage.getItem('voca_key') || '');
            const [character, setCharacter] = useState('');
            const [situation, setSituation] = useState('');
            const [mode, setMode] = useState('with_suggestions');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [suggestions, setSuggestions] = useState([]);
            const [loading, setLoading] = useState(false);
            const [explanation, setExplanation] = useState(null);
            const [expLoading, setExpLoading] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => scrollRef.current?.scrollIntoView({ behavior: "smooth" }), [messages, loading]);

            const callDeepSeek = async (promptMessages, stream = false) => {
                const res = await fetch("https://api.deepseek.com/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                    body: JSON.stringify({ model: "deepseek-chat", messages: promptMessages, stream })
                });
                if (!res.ok) throw new Error(`API Error: ${res.status}`);
                return res;
            };

            const startChat = () => {
                if (character && situation && apiKey) {
                    localStorage.setItem('voca_key', apiKey);
                    setStep('chat');
                    handleTriggerAI([]);
                } else { alert("Заполните поля и введите API-ключ."); }
            };

            const handleTriggerAI = async (history) => {
                setLoading(true); setSuggestions([]);
                const systemPrompt = `You are ${character}. Context: ${situation}. Speak ONLY English. Stay in character.`;
                const promptMessages = [{ role: "system", content: systemPrompt }, ...history];
                if (history.length === 0) promptMessages.push({ role: "user", content: "Please start the conversation." });

                setMessages(prev => [...prev, { role: 'assistant', content: '', translation: '' }]);

                try {
                    const response = await callDeepSeek(promptMessages, true);
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullEn = "";

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split("\n");
                        for (const line of lines) {
                            if (line.startsWith("data: ") && line !== "data: [DONE]") {
                                const data = JSON.parse(line.slice(6));
                                const content = data.choices[0].delta.content || "";
                                fullEn += content;
                                setMessages(prev => {
                                    const next = [...prev];
                                    next[next.length - 1].content = fullEn;
                                    return next;
                                });
                            }
                        }
                    }
                    handleFinalize(fullEn, history);
                } catch (err) { alert("Ошибка ключа."); setLoading(false); }
            };

            const handleFinalize = async (fullEn, history) => {
                try {
                    const transRes = await callDeepSeek([{ role: "user", content: `Translate to Russian (ONLY text): ${fullEn}` }]);
                    const transData = await transRes.json();
                    setMessages(prev => {
                        const next = [...prev];
                        next[next.length - 1].translation = transData.choices[0].message.content;
                        return next;
                    });

                    if (mode === 'with_suggestions') {
                        const sugRes = await callDeepSeek([{ role: "user", content: `Context: ${fullEn}. Give 2 English follow-up replies + Russian translations. Format: JSON array [{"en":"...", "ru":"..."}]` }]);
                        const sugData = await sugRes.json();
                        const match = sugData.choices[0].message.content.match(/\[.*\]/s);
                        if (match) setSuggestions(JSON.parse(match[0]).slice(0, 2));
                    }

                    if (history.length > 0) {
                        const userMsg = history[history.length - 1].content;
                        const corrRes = await callDeepSeek([{ role: "user", content: `Check user English: '${userMsg}'. If errors, return JSON {'corrected':'...', 'explanation':'...'} in Russian. Else NONE.` }]);
                        const corrData = await corrRes.json();
                        const cText = corrData.choices[0].message.content;
                        if (!cText.includes("NONE")) {
                            const cMatch = cText.match(/\{.*\}/s);
                            if (cMatch) {
                                const parsed = JSON.parse(cMatch[0]);
                                setMessages(prev => {
                                    const next = [...prev];
                                    const uIdx = next.findLastIndex(m => m.role === 'user');
                                    if (uIdx !== -1) next[uIdx].correction = parsed;
                                    return next;
                                });
                            }
                        }
                    }
                } catch (e) {} finally { setLoading(false); }
            };

            const handleExplain = async (text) => {
                setExplanation(""); setExpLoading(true);
                try {
                    const res = await callDeepSeek([{ role: "user", content: `Explain structure and grammar of: '${text}' for a student in Russian. Use Markdown.` }]);
                    const data = await res.json();
                    setExplanation(data.choices[0].message.content);
                } catch (err) { setExplanation("Ошибка."); } finally { setExpLoading(false); }
            };

            const downloadFile = () => {
                const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:sans-serif;max-width:800px;margin:40px auto;padding:20px;line-height:1.6}h1{color:#2563eb}h3{color:#1e40af;border-bottom:2px solid #eee}strong{background:#fef3c7;padding:2px 4px}</style></head><body><h1>Voca AI Lesson</h1>${marked.parse(explanation)}</body></html>`;
                const blob = new Blob([html], {type: 'text/html'});
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob); link.download = `Voca_Lesson.html`;
                link.click();
            };

            const sendMessage = (text) => {
                if (!text.trim() || loading) return;
                const newHistory = [...messages.filter(m => m.content), { role: 'user', content: text }];
                setMessages(newHistory); setInput('');
                handleTriggerAI(newHistory);
            };

            if (step === 'setup') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50">
                    <div className="bg-white p-8 md:p-12 rounded-[2.5rem] md:rounded-[3.5rem] shadow-2xl w-full max-w-xl border border-slate-100">
                        <h1 className="text-5xl font-black mb-6 text-blue-600 text-center uppercase italic">Voca AI</h1>
                        <div className="bg-blue-50 p-6 rounded-3xl mb-8 border border-blue-100">
                            <h3 className="font-bold text-blue-800 mb-3 italic">🚀 Как это работает?</h3>
                            <ul className="text-sm text-blue-700 space-y-3 font-medium">
                                <li>• Выбери любую роль и ситуацию.</li>
                                <li>• Разбор <b>«?»</b> объяснит структуру предложения.</li>
                                <li>• Voca AI исправит твои ошибки и даст совет.</li>
                                <li>• Все сообщения дублируются на русский.</li>
                            </ul>
                        </div>
                        <div className="space-y-5">
                            <input className="w-full p-5 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" type="password" placeholder="DeepSeek API Ключ (sk-...)" value={apiKey} onChange={e => setApiKey(e.target.value)} />
                            <input className="w-full p-5 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="С кем общаемся?" value={character} onChange={e => setCharacter(e.target.value)} />
                            <textarea className="w-full p-5 bg-slate-50 border rounded-2xl h-32 outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="Что за ситуация?" value={situation} onChange={e => setSituation(e.target.value)} />
                            <button onClick={startChat} className="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-xl hover:bg-blue-700 shadow-xl uppercase transition-all">Начать диалог</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-5xl mx-auto h-screen flex flex-col bg-white md:shadow-2xl relative overflow-hidden">
                    <header className="p-4 md:p-6 border-b flex justify-between items-center bg-white z-10 shadow-sm">
                        <div className="flex items-center gap-3"><div className="w-10 h-10 bg-blue-600 text-white rounded-xl flex items-center justify-center font-black text-xl">V</div><h2 className="font-black text-slate-900 text-xl md:text-2xl uppercase">Voca AI</h2></div>
                        <div className="flex items-center gap-2"><button onClick={() => setMode(mode === 'with_suggestions' ? 'free_input' : 'with_suggestions')} className={`px-3 py-2 rounded-xl text-[10px] font-black border-2 ${mode === 'with_suggestions' ? 'bg-blue-50 border-blue-200 text-blue-600' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>ПОДСКАЗКИ: {mode === 'with_suggestions' ? 'ВКЛ' : 'ВЫКЛ'}</button><button onClick={() => window.location.reload()} className="p-2 text-slate-300 hover:text-red-500"><svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg></button></div>
                    </header>
                    <div className="chat-scroll flex-1 p-4 md:p-8 bg-slate-50 px-6 md:px-16">
                        {messages.map((m, i) => (
                            <div key={i} className={`bubble ${m.role === 'user' ? 'user' : 'ai'}`}>
                                {m.content && (<div onClick={() => handleExplain(m.content)} className="explain-btn shadow-md">?</div>)}
                                <div className="font-semibold leading-relaxed whitespace-pre-wrap text-[1.05rem]">{m.content || <span className="dot-pulse">● ● ●</span>}</div>
                                {m.translation && <div className="translation">{m.translation}</div>}
                                {m.role === 'user' && m.correction && (<div className="mt-3 bg-white/10 p-3 rounded-xl text-xs border border-white/20 text-white font-medium"><div className="opacity-70 text-[9px] uppercase font-black mb-1 tracking-widest">Совет Voca:</div><div className="mb-1 font-bold text-[13px]">{m.correction.corrected}</div><div className="italic opacity-80">{m.correction.explanation}</div></div>)}
                            </div>
                        ))}
                        <div ref={scrollRef} />
                    </div>
                    {!loading && mode === 'with_suggestions' && suggestions.length > 0 && (
                        <div className="p-4 md:px-8 py-4 bg-white border-t"><div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {suggestions.map((s, i) => (<button key={i} onClick={() => sendMessage(s.en)} className="suggestion-card group active:scale-95 transition-transform"><div className="en-text">{s.en}</div><div className="ru-text">{s.ru}</div></button>))}
                        </div></div>
                    )}
                    <div className="p-4 md:p-8 bg-white border-t flex gap-2"><input className="flex-1 p-4 md:p-5 bg-slate-50 border rounded-[1.2rem] md:rounded-[1.5rem] outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-800" placeholder="Напиши по-английски..." value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && sendMessage(input)} disabled={loading} /><button onClick={() => sendMessage(input)} className="bg-blue-600 text-white px-6 md:px-10 rounded-[1.2rem] md:rounded-[1.5rem] font-extrabold hover:bg-blue-700 transition shadow-lg shadow-blue-100 disabled:opacity-50"><span className="hidden md:inline">ОТПРАВИТЬ</span><span className="md:hidden text-2xl">⮕</span></button></div>
                    {explanation !== null && (
                        <div className="modal-overlay" onClick={() => setExplanation(null)}><div className="bg-white rounded-[2rem] md:rounded-[3rem] shadow-2xl w-full max-w-2xl overflow-hidden animate-in fade-in zoom-in duration-300 mx-2" onClick={e => e.stopPropagation()}><div className="p-6 md:p-8 bg-amber-50 border-b border-amber-100 flex justify-between items-center text-amber-800"><h3 className="font-black text-lg md:text-xl uppercase">💡 Разбор от Voca AI</h3><button onClick={() => setExplanation(null)} className="p-2"><svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M6 18L18 6M6 6l12 12" /></svg></button></div><div className="p-6 md:p-10 max-h-[60vh] overflow-y-auto" dangerouslySetInnerHTML={{ __html: expLoading ? '<div class="flex justify-center py-10"><div class="dot-pulse text-4xl text-amber-400 font-bold">● ● ●</div></div>' : marked.parse(explanation) }}></div><div className="p-6 bg-slate-50 flex flex-col md:flex-row justify-between gap-3"><button onClick={downloadFile} className="px-6 py-3 bg-amber-100 border-2 border-amber-200 rounded-2xl font-black text-amber-700 uppercase text-[10px]">💾 Скачать конспект</button><button onClick={() => setExplanation(null)} className="px-10 py-3 bg-white border-2 border-slate-200 rounded-2xl font-black text-slate-600 uppercase text-[10px]">Понятно!</button></div></div></div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
