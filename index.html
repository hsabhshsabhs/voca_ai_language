<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>lingvo.ai — Твой личный репетитор</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        html, body, #root { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #f1f5f9; }
        body { font-family: 'Inter', -apple-system, blinkmacsystemfont, sans-serif; -webkit-font-smoothing: antialiased; }
        
        .app-layout { 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            max-width: 800px; 
            margin: 0 auto; 
            background: #ffffff;
            position: relative;
        }
        
        header { 
            height: 56px; 
            flex-shrink: 0; 
            border-bottom: 1px solid #e2e8f0; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 1rem;
            background: white;
            z-index: 20;
        }
        
        .chat-zone { 
            flex: 1;
            height: 65dvh;
            overflow-y: auto; 
            background-color: #e7ebf0;
            padding: 1rem;
            scrollbar-width: none;
        }
        .chat-zone::-webkit-scrollbar { display: none; }

        .bottom-panel { 
            height: 35dvh;
            display: flex; 
            flex-direction: column; 
            border-top: 1px solid #d1d9e0;
            background: white;
            flex-shrink: 0;
        }

        .suggestions-area {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            background: #ffffff;
        }

        .input-bar {
            height: 64px;
            flex-shrink: 0;
            padding: 0 0.75rem;
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid #f1f5f9;
            align-items: center;
            background: white;
        }

        .bubble { 
            max-width: 82%; 
            border-radius: 1rem; 
            padding: 0.6rem 0.9rem; 
            margin-bottom: 0.75rem; 
            position: relative; 
            font-size: 1.05rem; 
            line-height: 1.4;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .user { background: #effdde; color: #000; margin-left: auto; border-bottom-right-radius: 0.2rem; }
        .ai { background: white; color: #000; border-bottom-left-radius: 0.2rem; }
        
        .show-trans-btn {
            color: #2481cc;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 0.4rem;
            display: block;
            cursor: pointer;
            border-top: 1px solid #f1f1f1;
            padding-top: 0.3rem;
        }

        .translation-text { color: #64748b; font-style: italic; font-size: 0.9rem; margin-top: 0.4rem; border-top: 1px solid #f1f5f9; padding-top: 0.3rem; }
        
        .explain-btn { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; cursor: pointer; position: absolute; top: 4px; z-index: 10; transition: all 0.2s; }
        .ai .explain-btn { background: #fffbeb; color: #d97706; border: 1px solid #fef3c7; right: -38px; }
        .user .explain-btn { background: #eff6ff; color: #1e40af; border: 2px solid #dbeafe; left: -38px; }
        
        @media (max-width: 640px) {
            .bubble { max-width: 88%; font-size: 1rem; }
            .ai .explain-btn { right: 4px; top: -14px; width: 26px; height: 28px; font-size: 12px; }
            .user .explain-btn { left: 4px; top: -14px; width: 26px; height: 28px; font-size: 12px; }
        }

        .mini-q-icon {
            display: inline-flex;
            width: 20px;
            height: 20px;
            background: #fffbeb;
            color: #d97706;
            border: 1px solid #fef3c7;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 12px;
            margin: 0 4px;
            vertical-align: middle;
        }

        .suggestion-card { 
            background: #ffffff; border: 1px solid #d1d9e0; border-radius: 0.75rem; 
            padding: 0.6rem 1rem; transition: all 0.2s; text-align: left; 
            width: 100%; margin-bottom: 0.5rem;
        }
        .suggestion-card:hover { border-color: #2481cc; }
        .suggestion-card .en { font-size: 1.1rem; font-weight: 700; color: #2481cc; line-height: 1.2; }
        .suggestion-card .ru { font-size: 0.85rem; color: #64748b; margin-top: 1px; }
        
        .modal-overlay { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(6px); z-index: 999; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .dot-pulse { display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        .modal-body h3 { color: #1e40af; font-weight: 800; margin-top: 1.5rem; margin-bottom: 0.75rem; border-bottom: 2px solid #eff6ff; padding-bottom: 0.25rem; }
        .modal-body strong { background: #fef3c7; padding: 0 4px; border-radius: 4px; color: #1e293b; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [step, setStep] = useState('setup');
            const [apiKey, setApiKey] = useState(localStorage.getItem('lingvo_key') || '');
            const [character, setCharacter] = useState('');
            const [situation, setSituation] = useState('');
            const [mode, setMode] = useState('with_suggestions');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [suggestions, setSuggestions] = useState([]);
            const [loading, setLoading] = useState(false);
            const [explanation, setExplanation] = useState(null);
            const [expLoading, setExpLoading] = useState(false);
            const [visibleTranslations, setVisibleTranslations] = useState({});
            const scrollRef = useRef(null);

            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading, suggestions]);

            const callDeepSeek = async (msgs, stream = false) => {
                const res = await fetch("https://api.deepseek.com/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                    body: JSON.stringify({ model: "deepseek-chat", messages: msgs, stream })
                });
                if (!res.ok) throw new Error("API Error");
                return res;
            };

            const startChat = () => {
                if (character && situation && apiKey) {
                    localStorage.setItem('lingvo_key', apiKey);
                    setStep('chat');
                    handleTriggerAI([]);
                }
            };

            const handleTriggerAI = async (history) => {
                setLoading(true); setSuggestions([]);
                const msgs = [{ role: "system", content: `You are ${character}. Context: ${situation}. Speak ONLY English.` }, ...history];
                if (history.length === 0) msgs.push({ role: "user", content: "Please start the conversation." });
                setMessages(prev => [...prev, { role: 'assistant', content: '', translation: '', id: Date.now() }]);

                try {
                    const response = await callDeepSeek(msgs, true);
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullEn = "";
                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split("\n");
                        for (const line of lines) {
                            if (line.startsWith("data: ") && line !== "data: [DONE]") {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    fullEn += data.choices[0].delta.content || "";
                                    setMessages(prev => {
                                        const next = [...prev];
                                        next[next.length - 1].content = fullEn;
                                        return next;
                                    });
                                } catch(e) {}
                            }
                        }
                    }
                    finalize(fullEn, history);
                } catch (err) { alert("Ключ не работает."); setLoading(false); }
            };

            const finalize = async (fullEn, history) => {
                try {
                    const tRes = await callDeepSeek([{ role: "user", content: `Translate to Russian (ONLY text): ${fullEn}` }]);
                    const tData = await tRes.json();
                    const translation = tData.choices[0].message.content;
                    
                    setMessages(prev => {
                        const next = [...prev];
                        next[next.length - 1].translation = translation;
                        return next;
                    });

                    if (mode === 'with_suggestions') {
                        const sRes = await callDeepSeek([{ role: "user", content: `Context: ${fullEn}. Give 2 short natural replies. Format: JSON array [{"en":"...", "ru":"..."}]` }]);
                        const sData = await sRes.json();
                        const match = sData.choices[0].message.content.match(/\[.*\]/s);
                        if (match) setSuggestions(JSON.parse(match[0]).slice(0, 2));
                    }

                    if (history.length > 0) {
                        const userMsg = history[history.length - 1].content;
                        const corrRes = await callDeepSeek([{ role: "user", content: `Check user English: '${userMsg}'. If there are errors, return JSON {'corrected':'...', 'explanation':'...'} in Russian. If NO errors or it sounds natural, return ONLY the word NONE.` }]);
                        const corrData = await corrRes.json();
                        const cText = corrData.choices[0].message.content;
                        
                        if (!cText.toUpperCase().includes("NONE")) {
                            const cMatch = cText.match(/\{.*\}/s);
                            if (cMatch) {
                                const p = JSON.parse(cMatch[0]);
                                setMessages(prev => {
                                    const n = [...prev];
                                    const idx = n.findLastIndex(m => m.role === 'user');
                                    if (idx !== -1) n[idx].correction = p;
                                    return n;
                                });
                            }
                        }
                    }
                } finally { setLoading(false); }
            };

            const handleExplain = async (text) => {
                setExplanation(""); setExpLoading(true);
                try {
                    const res = await callDeepSeek([{ role: "user", content: `Explain structure and grammar of: '${text}' for a student in Russian. Use Markdown.` }]);
                    const data = await res.json();
                    setExplanation(data.choices[0].message.content);
                } catch (err) { setExplanation("Ошибка."); } finally { setExpLoading(false); }
            };

            const downloadFile = () => {
                const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>lingvo.ai - Lesson</title><style>body{font-family:sans-serif;max-width:800px;margin:40px auto;padding:20px;line-height:1.6}h1{color:#2481cc;text-align:center;border-bottom:4px solid #2481cc;padding-bottom:15px}h3{color:#1e40af;border-bottom:2px solid #eee;margin-top:30px}strong{background:#fef3c7;padding:2px 4px}</style></head><body><div style="background:white;padding:40px;border-radius:20px;border:1px solid #eee"><h1>lingvo.ai English Lesson</h1>${marked.parse(explanation)}</div></body></html>`;
                const blob = new Blob([html], {type: 'text/html'});
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob); link.download = `lingvo_Lesson.html`;
                link.click();
            };

            const toggleTranslation = (id) => {
                setVisibleTranslations(prev => ({ ...prev, [id]: !prev[id] }));
            };

            if (step === 'setup') return (
                <div className="h-full flex items-center justify-center p-4 bg-slate-50 overflow-y-auto">
                    <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl w-full max-w-xl border border-slate-100 my-auto">
                        <h1 className="text-5xl font-black mb-6 text-blue-600 text-center uppercase italic">lingvo.ai</h1>
                        <div className="bg-blue-50 p-6 rounded-3xl mb-8 border border-blue-100">
                            <h3 className="font-bold text-blue-800 mb-3 flex items-center gap-2 italic text-lg">🚀 Как это работает?</h3>
                            <ul className="text-sm text-blue-700 space-y-3 font-medium">
                                <li>• Выбери любую роль и ситуацию для общения.</li>
                                <li>• Разбор <span className="mini-q-icon">?</span> объяснит структуру предложения.</li>
                                <li>• lingvo.ai исправит твои ошибки и даст совет.</li>
                                <li>• Перевод скрыт — нажми, чтобы проверить себя.</li>
                            </ul>
                        </div>
                        <div className="space-y-4">
                            <input className="w-full p-5 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" type="password" placeholder="DeepSeek API Ключ" value={apiKey} onChange={e => setApiKey(e.target.value)} />
                            <input className="w-full p-5 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="С кем общаемся?" value={character} onChange={e => setCharacter(e.target.value)} />
                            <textarea className="w-full p-5 bg-slate-50 border rounded-2xl h-32 outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="Что за ситуация?" value={situation} onChange={e => setSituation(e.target.value)} />
                            <button onClick={startChat} className="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-xl hover:bg-blue-700 shadow-xl uppercase transition-all">Начать диалог</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="app-layout">
                    <header>
                        <div className="flex items-center gap-2"><div className="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center font-black">L</div><h2 className="font-black text-slate-900 text-xl tracking-tighter uppercase">lingvo.ai</h2></div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => setMode(mode === 'with_suggestions' ? 'free_input' : 'with_suggestions')} className={`px-3 py-1.5 rounded-xl text-[10px] font-black border-2 transition-all ${mode === 'with_suggestions' ? 'bg-blue-50 border-blue-200 text-blue-600' : 'bg-slate-50 text-slate-400'}`}>ПОДСКАЗКИ: {mode === 'with_suggestions' ? 'ВКЛ' : 'ВЫКЛ'}</button>
                            <button onClick={() => window.location.reload()} className="p-1.5 text-slate-300 hover:text-red-500"><svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg></button>
                        </div>
                    </header>

                    <main className="chat-zone">
                        {messages.map((m, i) => (
                            <div key={i} className={`bubble ${m.role === 'user' ? 'user' : 'ai'}`}>
                                {m.content && (<div onClick={() => handleExplain(m.content)} className="explain-btn shadow-sm">?</div>)}
                                <div className="font-medium whitespace-pre-wrap">{m.content || <span className="dot-pulse">● ● ●</span>}</div>
                                
                                {m.role === 'assistant' && m.translation && (
                                    <div>
                                        {!visibleTranslations[m.id] ? (
                                            <div onClick={() => toggleTranslation(m.id)} className="show-trans-btn">Показать перевод</div>
                                        ) : (
                                            <div className="translation-text">{m.translation}</div>
                                        )}
                                    </div>
                                )}

                                {m.role === 'user' && m.correction && (
                                    <div className="mt-3 bg-black/5 p-3 rounded-xl text-xs border border-black/10 text-black font-medium animate-in fade-in zoom-in duration-300">
                                        <div className="font-bold">⭐ Исправлено: {m.correction.corrected}</div>
                                        <div className="opacity-70 mt-1">{m.correction.explanation}</div>
                                    </div>
                                )}
                            </div>
                        ))}
                        <div ref={scrollRef} />
                    </main>

                    <footer className="bottom-panel">
                        <div className="suggestions-area">
                            {!loading && mode === 'with_suggestions' && suggestions.map((s, i) => (
                                <button key={i} onClick={() => { const n = [...messages.filter(m => m.content), { role: 'user', content: s.en }]; setMessages(n); handleTriggerAI(n); }} className="suggestion-card active:scale-[0.98]">
                                    <div className="en">{s.en}</div>
                                    <div className="ru">{s.ru}</div>
                                </button>
                            ))}
                        </div>
                        <div className="input-bar">
                            <input className="flex-1 p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-800 shadow-inner" placeholder="Ответь..." value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && sendMessage(input)} disabled={loading} />
                            <button onClick={() => { if(!loading && input.trim()) { const n = [...messages.filter(m => m.content), { role: 'user', content: input }]; setMessages(n); setInput(''); handleTriggerAI(n); } }} className="bg-blue-600 text-white w-12 h-12 rounded-2xl font-black shadow-lg disabled:opacity-50 flex items-center justify-center flex-shrink-0">⮕</button>
                        </div>
                    </footer>

                    {explanation !== null && (
                        <div className="modal-overlay" onClick={() => setExplanation(null)}>
                            <div className="bg-white rounded-[3rem] shadow-2xl w-full max-w-2xl overflow-hidden animate-in fade-in zoom-in duration-300 mx-2" onClick={e => e.stopPropagation()}>
                                <div className="p-8 bg-amber-50 border-b border-amber-100 flex justify-between items-center text-amber-800">
                                    <h3 className="font-black text-xl uppercase tracking-tighter">💡 Разбор lingvo.ai</h3>
                                    <button onClick={() => setExplanation(null)} className="p-2"><svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M6 18L18 6M6 6l12 12" /></svg></button>
                                </div>
                                <div className="p-10 max-h-[60vh] overflow-y-auto modal-body">
                                    {expLoading ? (
                                        <div className="flex flex-col items-center justify-center py-10 gap-6 text-center w-full">
                                            <div className="dot-pulse text-5xl text-amber-400 font-black tracking-widest">● ● ●</div>
                                            <p className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] animate-pulse">Анализируем правила...</p>
                                        </div>
                                    ) : (
                                        <div dangerouslySetInnerHTML={{ __html: marked.parse(explanation) }}></div>
                                    )}
                                </div>
                                <div className="p-8 bg-slate-50 flex justify-between gap-4"><button onClick={downloadFile} className="px-8 py-4 bg-amber-100 border-2 border-amber-200 rounded-2xl font-black text-amber-700 uppercase text-xs transition-all">💾 Скачать конспект</button><button onClick={() => setExplanation(null)} className="px-12 py-4 bg-white border-2 border-slate-200 rounded-2xl font-black text-slate-600 uppercase text-xs transition-all">Понятно!</button></div></div></div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
