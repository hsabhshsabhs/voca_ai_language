<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voca AI — Твой личный репетитор</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        html, body, #root { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        
        .app-container { height: 100%; display: flex; flex-direction: column; max-width: 1024px; margin: 0 auto; background: white; position: relative; }
        
        .chat-scroll { flex: 1; overflow-y: auto; padding: 1.5rem; background-color: #f8fafc; scrollbar-width: none; }
        .chat-scroll::-webkit-scrollbar { display: none; }

        .bubble { max-width: 85%; border-radius: 1.25rem; padding: 1rem 1.25rem; margin-bottom: 1rem; position: relative; font-size: 1.05rem; }
        .user { background: #2563eb; color: white; margin-left: auto; border-bottom-right-radius: 0.2rem; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15); }
        .ai { background: white; color: #1e293b; border-bottom-left-radius: 0.2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        .translation { color: #64748b; font-style: italic; font-size: 0.85rem; border-top: 1px solid #f1f5f9; margin-top: 0.75rem; padding-top: 0.5rem; }
        
        .explain-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; cursor: pointer; transition: all 0.2s; position: absolute; top: 8px; z-index: 10; }
        .ai .explain-btn { background: #fffbeb; color: #d97706; border: 2px solid #fef3c7; right: -40px; }
        .user .explain-btn { background: #eff6ff; color: #1e40af; border: 2px solid #dbeafe; left: -40px; }
        
        @media (max-width: 640px) {
            .chat-scroll { padding: 1rem; }
            .bubble { max-width: 90%; font-size: 0.95rem; }
            .ai .explain-btn { right: 4px; top: -12px; width: 28px; height: 28px; font-size: 12px; }
            .user .explain-btn { left: 4px; top: -12px; width: 28px; height: 28px; font-size: 12px; }
        }

        .bottom-zone { background: white; border-top: 1px solid #e2e8f0; flex-shrink: 0; }
        
        .suggestions-container { max-height: 25vh; overflow-y: auto; padding: 1rem; border-bottom: 1px solid #f1f5f9; }
        
        .suggestion-card { min-height: 70px; display: flex; flex-direction: column; justify-content: center; background: white; border: 2px solid #e2e8f0; border-radius: 1rem; padding: 0.75rem 1rem; transition: all 0.2s; text-align: left; margin-bottom: 0.5rem; }
        .suggestion-card:last-child { margin-bottom: 0; }
        .suggestion-card:hover { border-color: #3b82f6; background: #eff6ff; }
        .suggestion-card .en-text { font-size: 1.1rem; font-weight: 800; color: #1e40af; line-height: 1.2; }
        .suggestion-card .ru-text { font-size: 0.85rem; color: #64748b; margin-top: 2px; }
        
        .input-area { padding: 1rem; display: flex; gap: 0.75rem; align-items: center; }
        
        .modal-overlay { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(8px); z-index: 999; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .dot-pulse { display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [step, setStep] = useState('setup');
            const [apiKey, setApiKey] = useState(localStorage.getItem('voca_key') || '');
            const [character, setCharacter] = useState('');
            const [situation, setSituation] = useState('');
            const [mode, setMode] = useState('with_suggestions');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [suggestions, setSuggestions] = useState([]);
            const [loading, setLoading] = useState(false);
            const [explanation, setExplanation] = useState(null);
            const [expLoading, setExpLoading] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollIntoView({ behavior: "smooth" });
                }
            }, [messages, loading, suggestions]);

            const callDeepSeek = async (promptMessages, stream = false) => {
                const res = await fetch("https://api.deepseek.com/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                    body: JSON.stringify({ model: "deepseek-chat", messages: promptMessages, stream })
                });
                if (!res.ok) throw new Error(`API Error: ${res.status}`);
                return res;
            };

            const startChat = () => {
                if (character && situation && apiKey) {
                    localStorage.setItem('voca_key', apiKey);
                    setStep('chat');
                    handleTriggerAI([]);
                } else { alert("Заполните поля и введите ключ."); }
            };

            const handleTriggerAI = async (history) => {
                setLoading(true); setSuggestions([]);
                const systemPrompt = `You are ${character}. Context: ${situation}. Speak ONLY English. Natural and helpful.`;
                const promptMessages = [{ role: "system", content: systemPrompt }, ...history];
                if (history.length === 0) promptMessages.push({ role: "user", content: "Hi! Let's start." });

                setMessages(prev => [...prev, { role: 'assistant', content: '', translation: '' }]);

                try {
                    const response = await callDeepSeek(promptMessages, true);
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullEn = "";

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split("\n");
                        for (const line of lines) {
                            if (line.startsWith("data: ") && line !== "data: [DONE]") {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    const content = data.choices[0].delta.content || "";
                                    fullEn += content;
                                    setMessages(prev => {
                                        const next = [...prev];
                                        next[next.length - 1].content = fullEn;
                                        return next;
                                    });
                                } catch(e) {}
                            }
                        }
                    }
                    handleFinalize(fullEn, history);
                } catch (err) { alert("Ошибка API."); setLoading(false); }
            };

            const handleFinalize = async (fullEn, history) => {
                try {
                    const transRes = await callDeepSeek([{ role: "user", content: `Translate to Russian (ONLY text): ${fullEn}` }]);
                    const transData = await transRes.json();
                    setMessages(prev => {
                        const next = [...prev];
                        next[next.length - 1].translation = transData.choices[0].message.content;
                        return next;
                    });

                    if (mode === 'with_suggestions') {
                        const sugRes = await callDeepSeek([{ role: "user", content: `Context: ${fullEn}. Give 2 English follow-up replies + translations. Format: JSON array [{"en":"...", "ru":"..."}]` }]);
                        const sugData = await sugRes.json();
                        const match = sugData.choices[0].message.content.match(/\[.*\]/s);
                        if (match) setSuggestions(JSON.parse(match[0]).slice(0, 2));
                    }

                    if (history.length > 0) {
                        const userMsg = history[history.length - 1].content;
                        const corrRes = await callDeepSeek([{ role: "user", content: `Check user English: '${userMsg}'. If errors, return JSON {'corrected':'...', 'explanation':'...'} in Russian. Else NONE.` }]);
                        const corrData = await corrRes.json();
                        const cText = corrData.choices[0].message.content;
                        const cMatch = cText.match(/\{.*\}/s);
                        if (cMatch) {
                            const parsed = JSON.parse(cMatch[0]);
                            setMessages(prev => {
                                const next = [...prev];
                                const uIdx = next.findLastIndex(m => m.role === 'user');
                                if (uIdx !== -1) next[uIdx].correction = parsed;
                                return next;
                            });
                        }
                    }
                } catch (e) {} finally { setLoading(false); }
            };

            const handleExplain = async (text) => {
                setExplanation(""); setExpLoading(true);
                try {
                    const res = await callDeepSeek([{ role: "user", content: `Explain structure and grammar of: '${text}' for a student in Russian. Use Markdown.` }]);
                    const data = await res.json();
                    setExplanation(data.choices[0].message.content);
                } catch (err) { setExplanation("Ошибка."); } finally { setExpLoading(false); }
            };

            const sendMessage = (text) => {
                if (!text.trim() || loading) return;
                const newHistory = [...messages.filter(m => m.content), { role: 'user', content: text }];
                setMessages(newHistory); setInput('');
                handleTriggerAI(newHistory);
            };

            if (step === 'setup') return (
                <div className="h-full flex items-center justify-center p-4 bg-slate-50 overflow-y-auto">
                    <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl w-full max-w-xl border border-slate-100 my-auto">
                        <h1 className="text-5xl font-black mb-6 text-blue-600 text-center uppercase italic">Voca AI</h1>
                        <div className="bg-blue-50 p-6 rounded-2xl mb-8 border border-blue-100">
                            <h3 className="font-bold text-blue-800 mb-2 italic">🚀 Как это работает?</h3>
                            <ul className="text-sm text-blue-700 space-y-2 font-medium">
                                <li>• Выберите роль и ситуацию.</li>
                                <li>• Нажмите <b>«?»</b> для разбора правил.</li>
                                <li>• Исправляем ошибки на лету.</li>
                            </ul>
                        </div>
                        <div className="space-y-4">
                            <input className="w-full p-5 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" type="password" placeholder="DeepSeek API Ключ" value={apiKey} onChange={e => setApiKey(e.target.value)} />
                            <input className="w-full p-5 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="С кем общаемся?" value={character} onChange={e => setCharacter(e.target.value)} />
                            <textarea className="w-full p-5 bg-slate-50 border rounded-2xl h-32 outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="Что за ситуация?" value={situation} onChange={e => setSituation(e.target.value)} />
                            <button onClick={startChat} className="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-xl hover:bg-blue-700 shadow-xl uppercase transition-all">Начать</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="app-container shadow-2xl">
                    <header className="p-4 border-b flex justify-between items-center bg-white z-10 flex-shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-600 text-white rounded-xl flex items-center justify-center font-black text-xl">V</div>
                            <h2 className="font-black text-slate-900 text-xl tracking-tighter uppercase">Voca AI</h2>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setMode(mode === 'with_suggestions' ? 'free_input' : 'with_suggestions')} className={`px-3 py-2 rounded-xl text-[9px] font-black border-2 ${mode === 'with_suggestions' ? 'bg-blue-50 border-blue-200 text-blue-600' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>HINTS: {mode === 'with_suggestions' ? 'ON' : 'OFF'}</button>
                            <button onClick={() => window.location.reload()} className="p-2 text-slate-300 hover:text-red-500"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg></button>
                        </div>
                    </header>

                    <main className="chat-scroll">
                        {messages.map((m, i) => (
                            <div key={i} className={`bubble ${m.role === 'user' ? 'user' : 'ai'}`}>
                                {m.content && (<div onClick={() => handleExplain(m.content)} className="explain-btn shadow-md">?</div>)}
                                <div className="font-semibold leading-relaxed whitespace-pre-wrap">{m.content || <span className="dot-pulse">● ● ●</span>}</div>
                                {m.translation && <div className="translation">{m.translation}</div>}
                                {m.role === 'user' && m.correction && (<div className="mt-3 bg-white/10 p-3 rounded-xl text-xs border border-white/20 text-white font-medium"><div>⭐ {m.correction.corrected}</div><div className="italic opacity-80 mt-1">{m.correction.explanation}</div></div>)}
                            </div>
                        ))}
                        <div ref={scrollRef} />
                    </main>

                    <footer className="bottom-zone">
                        {!loading && mode === 'with_suggestions' && suggestions.length > 0 && (
                            <div className="suggestions-container">
                                {suggestions.map((s, i) => (
                                    <button key={i} onClick={() => sendMessage(s.en)} className="suggestion-card active:scale-[0.98]">
                                        <div className="en-text">{s.en}</div>
                                        <div className="ru-text">{s.ru}</div>
                                    </button>
                                ))}
                            </div>
                        )}
                        <div className="input-area">
                            <input className="flex-1 p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-800" placeholder="Ответь..." value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && sendMessage(input)} disabled={loading} />
                            <button onClick={() => sendMessage(input)} className="bg-blue-600 text-white px-6 py-4 rounded-2xl font-black shadow-lg disabled:opacity-50" disabled={loading || !input.trim()}>
                                <span className="hidden sm:inline">ОТПРАВИТЬ</span><span className="sm:hidden text-xl">⮕</span>
                            </button>
                        </div>
                    </footer>

                    {explanation !== null && (
                        <div className="modal-overlay" onClick={() => setExplanation(null)}><div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden animate-in fade-in zoom-in duration-300 mx-2" onClick={e => e.stopPropagation()}><div className="p-6 bg-amber-50 border-b border-amber-100 flex justify-between items-center text-amber-800"><h3 className="font-black text-lg uppercase">💡 Разбор Voca AI</h3><button onClick={() => setExplanation(null)} className="p-2"><svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M6 18L18 6M6 6l12 12" /></svg></button></div><div className="p-6 max-h-[60vh] overflow-y-auto modal-body" dangerouslySetInnerHTML={{ __html: expLoading ? '<div class="flex justify-center py-10"><div class="dot-pulse text-4xl text-amber-400 font-bold">● ● ●</div></div>' : marked.parse(explanation) }}></div><div className="p-6 bg-slate-50 flex justify-end"><button onClick={() => setExplanation(null)} className="px-10 py-3 bg-white border-2 border-slate-200 rounded-2xl font-black text-slate-600 uppercase text-xs">Понятно!</button></div></div></div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
